<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">Quiz Generator</h2>

{% if not subject %}
<form method="POST">
    <select name="subject" class="w-full p-2 border rounded mb-3">
        {% for key in question_bank.keys() %}
        <option>{{ key }}</option>
        {% endfor %}
    </select>
    <button class="bg-indigo-600 text-white px-4 py-2 rounded">Start Quiz</button>
</form>
{% else %}
<form action="/submit_quiz" method="POST">
    {% for q in questions %}
        <p class="font-semibold">{{ loop.index }}. {{ q.question }}</p>
        {% for option in q.options %}
            <label class="block">
                <input type="radio" name="q{{ loop.index0 }}" value="{{ option }}" required>
                {{ option }}
            </label>
        {% endfor %}
        <br>
    {% endfor %}
    <button class="bg-indigo-600 text-white px-4 py-2 rounded">Submit</button>
</form>
{% endif %}

</div>

</body>
</html>
