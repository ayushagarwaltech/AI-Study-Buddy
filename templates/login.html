<!DOCTYPE html>
<html>
<head>
    <title>AI Study Buddy - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">
    <h2 class="text-2xl font-bold text-center mb-4">AI Study Buddy</h2>

    <div class="text-sm bg-gray-100 p-3 rounded mb-4">
        <p><b>Demo:</b> demo / demo123</p>
        <p><b>Admin:</b> admin / admin123</p>
    </div>

    {% if error %}
        <p class="text-red-500 mb-2">{{ error }}</p>
    {% endif %}

    <form method="POST" class="space-y-3">
        <input type="text" name="username" placeholder="Username"
               class="w-full p-2 border rounded" required>

        <input type="password" name="password" placeholder="Password"
               class="w-full p-2 border rounded" required>

        <button class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">
            Login
        </button>
    </form>

    <a href="/guest">
        <button class="w-full mt-3 bg-gray-600 text-white py-2 rounded hover:bg-gray-700">
            Continue as Guest
        </button>
    </a>
</div>

</body>
</html>
