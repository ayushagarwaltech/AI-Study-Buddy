<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow text-center w-96">
    <h2 class="text-xl font-bold mb-3">Quiz Result</h2>
    <p><b>Subject:</b> {{ subject }}</p>
    <p><b>Score:</b> {{ score }}</p>
    <p class="mt-2 text-gray-600">{{ weakness }}</p>
    <a href="/dashboard">
        <button class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded">Back</button>
    </a>
</div>

</body>
</html>
